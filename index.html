<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生活型態醫學整合平台 - 雲端/本機雙軌版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .editable-area { transition: all 0.2s; outline: none; min-height: 1.5rem; }
    .editable-area:hover { background-color: #f8fafc; box-shadow: 0 0 0 1px #cbd5e1; border-radius: 0.25rem; }
    .editable-area:focus { background-color: #fff; box-shadow: 0 0 0 2px #3b82f6; border-radius: 0.25rem; }
    select.custom-select {
      appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem;
    }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    #loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; color: #2563eb; }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 flex flex-col min-h-screen">

  <div id="loading-overlay">
      <i data-lucide="loader-2" class="w-8 h-8 animate-spin mb-4"></i>
      <div id="loading-text" class="text-lg">正在連線至 Firebase 雲端資料庫...</div>
      <div class="text-sm text-slate-500 mt-2 font-normal">若連線逾時，將自動切換為本機模式</div>
  </div>
  <div id="app" class="flex flex-col min-h-screen hidden"></div>

  <!-- 引入 Firebase 核心與服務 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 1. 全域常數與對照表
    const ROLES = [
      { id: 'CaseManager', name: '個管師', icon: 'users', color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-500' },
      { id: 'Coach', name: '運動教練', icon: 'activity', color: 'text-green-600', bg: 'bg-green-50', border: 'border-green-500' },
      { id: 'Nutritionist', name: '營養師', icon: 'utensils', color: 'text-orange-600', bg: 'bg-orange-50', border: 'border-orange-500' },
      { id: 'SocialWorker', name: '社工師', icon: 'heart-handshake', color: 'text-purple-600', bg: 'bg-purple-50', border: 'border-purple-500' },
      { id: 'Psychologist', name: '心理師', icon: 'brain', color: 'text-pink-600', bg: 'bg-pink-50', border: 'border-pink-500' },
    ];
    const MEAL_TIMES = ["早餐", "早點", "午餐", "午點", "晚餐", "晚點"];
    const FOOD_CATEGORIES = [{ id: 'milk_full', label: '奶類-全脂' }, { id: 'milk_low', label: '奶類-低脂' }, { id: 'milk_none', label: '奶類-脫脂' }, { id: 'grain', label: '主食類' }, { id: 'meat_low', label: '肉類-低脂' }, { id: 'meat_med', label: '肉類-中脂' }, { id: 'meat_high', label: '肉類-高脂' }, { id: 'legume', label: '豆類' }, { id: 'veggie', label: '蔬菜類' }, { id: 'fruit', label: '水果類' }, { id: 'oil', label: '油脂類' }];
    const BSRS_QUESTIONS = ["睡眠困難(如難以入睡、易醒或早醒)", "感覺緊張或不安", "覺得容易苦惱或動怒", "感覺憂鬱、心情低落", "覺得比不上別人", "★有自殺的想法"];
    const ISI_QUESTIONS = ["入睡困難", "無法維持較長睡眠", "太早醒", "最近睡眠狀態滿意度", "睡眠干擾日常功能程度", "他人是否注意到您的影響", "睡眠問題令您擔心/困擾程度"];
    const EXERCISE_OPTIONS = { habit: ["完全無經驗", "曾連續3個月以上", "不定期"], freq: ["無", "每週1-2次", "每週3次", "每週3-5次", "每週5-7次"], duration: ["<30分", "30分-1hr", "1-1.5hr", "1.5-2hr", ">2hr"] };
    const baseMeta = { date: '2026-03-04', author: '測試人員', photos: [], files: [] };

    // ★ 您專屬的 Firebase 金鑰
    const firebaseConfig = {
      apiKey: "AIzaSyD1_j1r21OnD43CJHUaraoUthYNmHxk4Zg",
      authDomain: "lifestyle-med-system.firebaseapp.com",
      projectId: "lifestyle-med-system",
      storageBucket: "lifestyle-med-system.firebasestorage.app",
      messagingSenderId: "820116366544",
      appId: "1:820116366544:web:b062fe4cf3f9f7e3826ad5",
      measurementId: "G-1BKJ1ZY7YM"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'lifestyle-med-system';
    
    // 全域狀態 (增加 useCloud 判斷是否使用雲端)
    window.appState = { 
        view: 'list', patients: [], selectedPatientId: null, 
        activeTab: 'CaseManager', lastSaved: '尚未儲存', 
        currentUser: null, useCloud: true 
    };

    // --- 雲端與本機雙軌初始化 ---
    async function initSystem() {
      lucide.createIcons();
      try {
        await signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => {
          if (user) {
            window.appState.currentUser = user;
            setupRealtimeListener(user.uid);
          }
        });
      } catch (error) { 
        console.error("Firebase 連線提示: 無法登入，將切換至本機模式。詳細錯誤:", error);
        fallbackToLocal(true);
      }
    }

    // 本機模式啟動
    function fallbackToLocal(showWarning) {
        window.appState.useCloud = false;
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');
        
        if(showWarning) {
             setTimeout(() => showToast("已切換至本機模式 (雲端連線失敗)", "text-yellow-400", "alert-triangle"), 500);
        }
        
        const savedData = localStorage.getItem('clinicPatientsDataProX_Local');
        if (savedData) {
            window.appState.patients = JSON.parse(savedData);
        } else {
            window.appState.patients = [createDefaultPatient()];
        }
        window.appState.lastSaved = new Date().toLocaleTimeString() + ' (本機)';
        window.render();
    }

    // 設定 Firestore 即時監聽
    let unsubscribeSnapshot = null;
    function setupRealtimeListener(userId) {
      if(unsubscribeSnapshot) unsubscribeSnapshot();
      
      // 修復路徑：確保 Firestore 路徑為偶數段 (補上最後的文件名稱 'mainList')
      const docRef = doc(db, 'artifacts', appId, 'users', userId, 'patientsData', 'mainList');

      unsubscribeSnapshot = onSnapshot(docRef, (snapshot) => {
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');

        if (snapshot.exists()) {
          window.appState.patients = snapshot.data().list || [];
          window.appState.lastSaved = new Date().toLocaleTimeString() + ' (雲端同步)';
        } else {
           // 若雲端無資料，建立預設資料並上傳
           window.appState.patients = [createDefaultPatient()];
           syncToCloud(); 
        }
        window.render();
      }, (error) => {
        console.error("Firestore Listen Error:", error);
        fallbackToLocal(true);
      });
    }

    // 雙軌儲存邏輯 (支援雲端與本機)
    window.syncToCloud = async function() {
       if (!window.appState.useCloud) {
           // 本機儲存模式
           localStorage.setItem('clinicPatientsDataProX_Local', JSON.stringify(window.appState.patients));
           window.appState.lastSaved = new Date().toLocaleTimeString() + ' (本機)';
           showToast("已儲存至本機端 (雲端離線)", "text-yellow-400", "hard-drive");
           window.render();
           return;
       }

       // 雲端儲存模式
       if(!window.appState.currentUser) return;
       const userId = window.appState.currentUser.uid;
       // 修復路徑：確保存檔時的 Reference 也是偶數段
       const docRef = doc(db, 'artifacts', appId, 'users', userId, 'patientsData', 'mainList');
       
       try {
           const timeIndicator = document.getElementById('last-saved-time');
           if(timeIndicator) timeIndicator.innerHTML = `<i data-lucide="refresh-cw" class="w-4 h-4 animate-spin text-blue-500"></i> 雲端同步中...`;
           
           await setDoc(docRef, { list: window.appState.patients });
           window.appState.lastSaved = new Date().toLocaleTimeString() + ' (雲端同步)';
           showToast("已同步至 Firebase 雲端", "text-green-400", "cloud-check");
           if(timeIndicator) timeIndicator.innerHTML = `<i data-lucide="cloud-check" class="w-4 h-4 text-green-500"></i> 已同步: ${window.appState.lastSaved}`;
       } catch(e) { 
           console.error("Save Error", e); 
           showToast("儲存至雲端失敗，請檢查網路", "text-red-400", "alert-circle");
       }
    }

    // 共用 Toast 提示
    function showToast(message, colorClass, icon = "check-circle") {
       const existingToast = document.getElementById('system-toast');
       if(existingToast) existingToast.remove();
       
       const toast = document.createElement('div');
       toast.id = 'system-toast';
       toast.className = 'fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-2 rounded shadow-lg z-50 transition-opacity duration-300 flex items-center gap-2 font-medium';
       toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 ${colorClass}"></i> ${message}`;
       document.body.appendChild(toast);
       lucide.createIcons();
       setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 2500);
    }

    function createDefaultPatient() {
        return {
            id: 'P001', name: '林秋朎', gender: '女', birthday: '1954-11-16', age: 71, phone: '0989-199605',
            height: 156, weight: 50, bmi: 20.5, waist: 89, intakeDate: '2026-02-03', clinicName: '李俊杰診所',
            systolic: 169, diastolic: 87, bpStage: '高血壓第2期', sugar: 115, hbA1c: 8.5, chol: 151, tg: 87, ldl: 56,
            meds: ['高血壓', '糖尿病'], ckdStage: '3級', ckmStage: '3期', criteria: ['符合高血壓收案', '符合高血糖收案'],
            otherDiseases: '無', cgmInstallDate: '2026-02-03至2026-02-12', smartBandDate: '2026-02-03',
            gripStrength: 17.7, asm: 32.8, asmIndex: 13.48, sarcopeniaResult: '肌少症確診', bodyFat: 13.5,
            professionalNeeds: ['運動計畫', '營養', '社會資源'], smartBandWillingness: '有意願', bodyType: '標準型', photos: [],
            history: [{ month: '初始', date: '2026-02-03', weight: 50, bodyFat: 13.5, sbp: 169, dbp: 87, sugar: 115, hbA1c: 8.5, chol: 151, tg: 87, ldl: 56 }],
            followUps: [{ id: 1, date: '2026-02-03', type: '初訪', content: '定期追蹤血糖及血壓變化', recorder: '家慧' }],
            caseManagerData: { meta: JSON.parse(JSON.stringify(baseMeta)) },
            exerciseData: { habit: '不定期', freq: '每週1-2次', duration: '30分-1hr', items: ['快走', '散步'], barriers: ['沒動力'], lessons: [{id: 1, completed: true, date: '2026-02-10', aerobic: ['跑步機'], strength: ['下肢(深蹲/硬舉)', '核心穩定'], action: '下肢推50kg 8下3組、棒式1分鐘', photos: [], files: []}], meta: JSON.parse(JSON.stringify(baseMeta)) },
            nutritionData: { habits: { source: '自己烹調', dietType: '葷', caregiver: '自己', mealsPerDay: 3, giIssues: ['便秘'], regularTiming: '是' }, diabetes: { onsetYear: '2015', treatment: '口服降血糖', selfBloodSugar: '0', hasCareCard: '是' }, goal: '血糖與血壓控制', dailySuggestedKcal: 1692, distribution: { milk_low: { 早餐: 1 }, grain: { 早餐: 2, 午餐: 3, 晚餐: 3 }, meat_low: { 午餐: 2, 晚餐: 2 }, veggie: { 午餐: 1.5, 晚餐: 1.5 }, fruit: { 午點: 1 }, oil: { 午餐: 1 } }, planHistory: [], records: [], meta: JSON.parse(JSON.stringify(baseMeta)) },
            socialWorkData: { familyStatus: { living: '與家人同住', familyRel: '普通', relativeRel: '疏離', description: '目前與家屬同住，家庭支持系統尚可。' }, emergencyContact: { name: '家屬', relation: '子女', phone: '未提供' }, welfare: { status: ['無'], insurance: ['勞保'] }, treatment: { welfareConsult: ['長照資源'], emotionAdapt: ['引導正向思考', '加強問題解決能力'], familyProblem: ['評估家庭支持系統'], description: '提供健康促進衛教，評估長照資源需求。', signature: '社工師' }, meta: JSON.parse(JSON.stringify(baseMeta)) },
            psychData: { bsrs: [1, 2, 1, 0, 0, 0], suicideIdeation: 0, isi: [1, 2, 1, 1, 1, 0, 1], records: [{ id: 1, date: '2026-02-25', time: '14:50', project: '門診評估', content: '醫師開立生活型態醫學評估諮詢，安排後續計畫。', recorder: '吳珮如' }], meta: JSON.parse(JSON.stringify(baseMeta)) }
        };
    }

    // --- UI 控制與邏輯 ---
    window.navigateTo = function(view, patientId = null) {
      window.appState.view = view;
      if (patientId) {
        window.appState.selectedPatientId = patientId;
        window.appState.activeTab = 'CaseManager'; 
      }
      window.render();
    }

    window.switchTab = function(tabId) {
      window.appState.activeTab = tabId;
      window.render();
    }

    window.handleContentUpdate = function(patientId, path, element) {
      const patient = window.appState.patients.find(p => p.id === patientId);
      if (!patient) return;
      const newValue = element.innerText || element.value; 
      const keys = path.split('.');
      let current = patient;
      for (let i = 0; i < keys.length - 1; i++) {
        if (!current[keys[i]]) current[keys[i]] = {};
        current = current[keys[i]];
      }
      const finalValue = isNaN(newValue) || newValue === '' ? newValue : Number(newValue);
      current[keys[keys.length - 1]] = finalValue;
      if (path === 'height' || path === 'weight') {
          if (patient.height && patient.weight) { patient.bmi = Number((patient.weight / Math.pow(patient.height / 100, 2)).toFixed(1)); }
      }
      window.syncToCloud();
      if(path.includes('bsrs') || path.includes('isi') || path === 'height' || path === 'weight' || path.includes('nutritionData.distribution') || path.includes('nutritionData.dailySuggestedKcal')) {
          window.render();
      }
    }

    window.addNewRecord = function(type) {
      const patient = window.appState.patients.find(p => p.id === window.appState.selectedPatientId);
      if (!patient) return;
      const today = new Date().toISOString().split('T')[0];
      if (type === 'followUp') {
        if (!patient.followUps) patient.followUps = [];
        patient.followUps.push({ id: Date.now(), date: today, type: '追蹤紀錄', content: '請在此輸入新紀錄內容...', recorder: patient.caseManagerData?.meta?.author || '未具名' });
      } else if (type === 'lesson') {
        if (!patient.exerciseData.lessons) patient.exerciseData.lessons = [];
        const nextId = patient.exerciseData.lessons.length + 1;
        patient.exerciseData.lessons.push({ id: nextId, completed: false, date: today, aerobic: [], strength: [], action: '請輸入訓練備註...', photos: [], files: [] });
      } else if (type === 'psychRecord') {
        if (!patient.psychData.records) patient.psychData.records = [];
        patient.psychData.records.push({ id: Date.now(), date: today, time: new Date().toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit', hour12: false}), project: '一般會談', content: '請填寫會談紀錄...', recorder: patient.psychData?.meta?.author || '心理師' });
      } else if (type === 'nutritionRecord') {
        if (!patient.nutritionData.records) patient.nutritionData.records = [];
        patient.nutritionData.records.push({ id: Date.now(), date: today, recorder: patient.nutritionData?.meta?.author || '營養師', content: '請輸入本次營養諮詢與衛教紀錄...' });
      }
      window.syncToCloud();
    }

    window.deleteRecordItem = function(path, index) {
        if(!confirm('確定要刪除這筆紀錄嗎？')) return;
        const patient = window.appState.patients.find(p => p.id === window.appState.selectedPatientId);
        let target = patient;
        const keys = path.split('.');
        for(let key of keys) target = target[key];
        if(Array.isArray(target)) { target.splice(index, 1); window.syncToCloud(); }
    }

    window.saveMetricsHistory = function() {
        const patient = window.appState.patients.find(p => p.id === window.appState.selectedPatientId);
        if (!patient) return;
        const dateInput = document.getElementById('history_date').value;
        if(!dateInput) { alert('請選擇日期'); return; }
        let labelInput = document.getElementById('history_label').value;
        if(!labelInput) { const d = new Date(dateInput); labelInput = `${d.getMonth()+1}/${d.getDate()}`; }
        if(!patient.history) patient.history = [];
        patient.history.push({ month: labelInput, date: dateInput, weight: patient.weight, bodyFat: patient.bodyFat, sbp: patient.systolic, dbp: patient.diastolic, sugar: patient.sugar, hbA1c: patient.hbA1c, chol: patient.chol, tg: patient.tg, ldl: patient.ldl });
        patient.history.sort((a, b) => new Date(a.date) - new Date(b.date));
        window.syncToCloud(); 
    };

    window.saveNutritionPlanAsHistory = function() {
        const patient = window.appState.patients.find(p => p.id === window.appState.selectedPatientId);
        if (!patient) return;
        if (!patient.nutritionData.planHistory) patient.nutritionData.planHistory = [];
        patient.nutritionData.planHistory.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], goal: patient.nutritionData.goal || '未設定目標', kcal: patient.nutritionData.dailySuggestedKcal || 0, distribution: JSON.parse(JSON.stringify(patient.nutritionData.distribution || {})) });
        window.syncToCloud(); 
    };

    window.toggleArrayItem = function(patientId, path, value, checkboxElement) {
        const patient = window.appState.patients.find(p => p.id === patientId);
        if (!patient) return;
        const keys = path.split('.');
        let target = patient;
        for (let i = 0; i < keys.length - 1; i++) { if (!target[keys[i]]) target[keys[i]] = {}; target = target[keys[i]]; }
        const lastKey = keys[keys.length - 1];
        if (!Array.isArray(target[lastKey])) target[lastKey] = [];
        if (checkboxElement.checked) { if (!target[lastKey].includes(value)) target[lastKey].push(value); } 
        else { target[lastKey] = target[lastKey].filter(v => v !== value); }
        window.syncToCloud();
    };

    window.updateOtherArrayItems = function(patientId, path, predefinedOptionsStr, newValueStr) {
        const patient = window.appState.patients.find(p => p.id === window.appState.selectedPatientId);
        if (!patient) return;
        const predefinedOptions = predefinedOptionsStr.split('|');
        const keys = path.split('.');
        let target = patient;
        for (let i = 0; i < keys.length - 1; i++) { if (!target[keys[i]]) target[keys[i]] = {}; target = target[keys[i]]; }
        const lastKey = keys[keys.length - 1];
        let currentArr = Array.isArray(target[lastKey]) ? target[lastKey] : [];
        let updatedArr = currentArr.filter(item => predefinedOptions.includes(item));
        const newItems = newValueStr.split(/[、,，\s\n]+/).filter(Boolean);
        newItems.forEach(item => { if (!updatedArr.includes(item)) updatedArr.push(item); });
        target[lastKey] = updatedArr;
        window.syncToCloud();
    };

    window.triggerPhotoUpload = function() { document.getElementById('photo-upload-input').click(); }
    window.handlePhotoUpload = function(event, patientId) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const patient = window.appState.patients.find(p => p.id === patientId);
          patient.photos = [{ id: Date.now(), url: e.target.result, name: file.name }];
          window.syncToCloud(); 
        };
        reader.readAsDataURL(file);
      }
    }

    window.handleTabAttachmentUpload = function(event, patientId, dataPath, type) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const patient = window.appState.patients.find(p => p.id === patientId);
        let target = patient;
        const keys = dataPath.split('.');
        for (let i = 0; i < keys.length; i++) { if (!target[keys[i]]) target[keys[i]] = {}; target = target[keys[i]]; }
        if (!target[type]) target[type] = [];
        target[type].push({ id: Date.now(), name: file.name, url: e.target.result, size: (file.size / 1024).toFixed(1) + ' KB' });
        target.date = new Date().toISOString().split('T')[0];
        window.syncToCloud(); 
      };
      reader.readAsDataURL(file);
    }

    window.removeTabAttachment = function(patientId, dataPath, type, attachmentId) {
      if (!confirm('確定要移除此附件嗎？')) return;
      const patient = window.appState.patients.find(p => p.id === patientId);
      let target = patient;
      const keys = dataPath.split('.');
      for (let i = 0; i < keys.length; i++) { if (!target[keys[i]]) return; target = target[keys[i]]; }
      if (target[type]) { target[type] = target[type].filter(item => item.id !== attachmentId); window.syncToCloud(); }
    }

    // ★ CSV 匯出邏輯
    window.exportToCSV = function() {
        const patient = window.appState.patients.find(p => p.id === window.appState.selectedPatientId);
        if (!patient) return;

        const roleName = ROLES.find(r => r.id === window.appState.activeTab).name;

            csvContent += `"${d.diabetes?.onsetYear || ''}","${d.diabetes?.treatment || ''}","${d.diabetes?.hasCareCard || ''}",${d.dailySuggestedKcal || ''},"${(d.goal || '').replace(/"/g, '""')}"\n\n`;
            
            csvContent += `[食物內容設定與各餐次分配 (當前最新)]\n`;
            csvContent += `食物分類,早餐,早點,午餐,午點,晚餐,晚點,總計\n`;
            ['milk_low', 'grain', 'meat_low', 'meat_med', 'veggie', 'fruit', 'oil'].forEach(catId => {
                const category = FOOD_CATEGORIES.find(c => c.id === catId);

                    const val = dist[meal] || '';

                    row += `,${val}`;
                });

                csvContent += row;

            csvContent += `\n`;

            csvContent += `[營養衛教與會談紀錄]\n`;
            csvContent += `日期,紀錄者,紀錄內容\n`;
            (d.records || []).forEach(r => {

        else if (window.appState.activeTab === 'SocialWorker') {

            csvContent += `[家庭狀況評估]\n`;

            csvContent += `"${d.familyStatus?.living || ''}","${d.familyStatus?.familyRel || ''}","${d.emergencyContact?.name || ''}","${d.emergencyContact?.relation || ''}","${d.emergencyContact?.phone || ''}","${(d.familyStatus?.description || '').replace(/"/g, '""')}"\n\n`;
            
            csvContent += `[福利與保險身分]\n`;
            csvContent += `社會福利身分,社會保險身分\n`;
            csvContent += `"${Array.isArray(d.welfare?.status) ? d.welfare.status.join('、') : (d.welfare?.status || '')}","${Array.isArray(d.welfare?.insurance) ? d.welfare.insurance.join('、') : (d.welfare?.insurance || '')}"\n\n`;
            
            csvContent += `[處遇內容與說明]\n`;
            csvContent += `福利諮詢,情緒與疾病適應,家庭問題,處遇說明\n`;
            csvContent += `"${Array.isArray(d.treatment?.welfareConsult) ? d.treatment.welfareConsult.join('、') : ''}","${Array.isArray(d.treatment?.emotionAdapt) ? d.treatment.emotionAdapt.join('、') : ''}","${Array.isArray(d.treatment?.familyProblem) ? d.treatment.familyProblem.join('、') : ''}","${(d.treatment?.description || '').replace(/"/g, '""')}"\n`;

        else if (window.appState.activeTab === 'Psychologist') {
            const d = patient.psychData || {};
            csvContent += `--- ${roleName} 專屬資料 ---\n\n`;
            
            const bsrsTotal = (d.bsrs || []).slice(0, 5).reduce((a, b) => a + Number(b), 0);
            const suicideScore = Number(d.bsrs?.[5] || 0);
            csvContent += `[BSRS-5 簡式健康量表]\n`;
            csvContent += `總分 (前5題),第6題(自殺意念)分數\n`;
            csvContent += `${bsrsTotal},${suicideScore}\n`;
            csvContent += `題號,評估項目(近一週),分數\n`;
            BSRS_QUESTIONS.forEach((q, idx) => {
                csvContent += `${idx+1},"${q}",${d.bsrs?.[idx] || 0}\n`;
            });
            csvContent += `\n`;

            const isiTotal = (d.isi || []).reduce((a, b) => a + Number(b), 0);
            csvContent += `[ISI 失眠嚴重度量表]\n`;
            csvContent += `總分\n`;
            csvContent += `${isiTotal}\n`;
            csvContent += `題號,評估項目(近兩週),分數\n`;
            ISI_QUESTIONS.forEach((q, idx) => {
                csvContent += `${idx+1},"${q}",${d.isi?.[idx] || 0}\n`;
            });
            csvContent += `\n`;

            csvContent += `[照護會談紀錄]\n`;
            csvContent += `日期,時間,紀錄者,類別/專案,紀錄內容\n`;
            (d.records || []).forEach(r => {
                csvContent += `${r.date || ''},${r.time || ''},${r.recorder || ''},"${r.project || ''}","${(r.content || '').replace(/"/g, '""')}"\n`;
            });
        }

        // 產生並下載檔案
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `${patient.name}_${roleName}評估紀錄_${new Date().toISOString().split('T')[0]}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        showToast("已成功匯出 CSV 檔案", "text-blue-400", "download");
    };


    // --- UI 渲染函式群 ---
    function renderTrendChart(data, dataKey, color, label, unit) {
      if (!data || data.length === 0 || !data.some(d => d[dataKey])) return `<div class="p-4 text-gray-500 text-center text-sm bg-gray-50 rounded-lg w-full max-w-[280px] flex items-center justify-center border border-slate-100 min-h-[140px]">${label} 尚無資料</div>`;
      const values = data.map(d => Number(d[dataKey]) || 0).filter(v => v !== 0);
      if(values.length === 0) return `<div class="p-4 text-gray-500 text-center text-sm bg-gray-50 rounded-lg w-full max-w-[280px] flex items-center justify-center border border-slate-100 min-h-[140px]">${label} 尚無資料</div>`;
      
      const max = Math.max(...values) * 1.1;
      const min = Math.min(...values) * 0.9;
      const range = max - min === 0 ? 1 : max - min;
      const width = 240; const height = 100; const paddingX = 20; const paddingY = 20;

      const points = data.map((d, i) => {
        const val = Number(d[dataKey]) || 0;
        const x = data.length > 1 ? (i / (data.length - 1)) * (width - paddingX * 2) + paddingX : width / 2;
        const y = height - paddingY - ((val - min) / range) * (height - paddingY * 2);
        return { x, y, val, label: d.month };
      });
      const pathData = points.map((p, i) => (i === 0 ? `M ${p.x} ${p.y}` : `L ${p.x} ${p.y}`)).join(' ');
      const circlesHtml = points.map(p => `
        <g class="group cursor-pointer">
          <circle cx="${p.x}" cy="${p.y}" r="4" fill="white" stroke="${color}" stroke-width="2" class="transition-all group-hover:r-5"></circle>
          <text x="${p.x}" y="${p.y - 12}" text-anchor="middle" font-size="11" font-weight="bold" fill="${color}" class="opacity-80 group-hover:opacity-100">${p.val}</text>
        </g>
      `).join('');
      const labelsHtml = points.map(p => `<span>${p.label}</span>`).join('');

      return `
        <div class="flex flex-col items-center p-3 bg-white border border-gray-100 shadow-sm rounded-xl w-full max-w-[280px]">
          <div class="text-sm font-semibold mb-2 text-gray-700 flex items-center gap-1">${label} <span class="text-xs font-normal text-gray-400">(${unit})</span></div>
          <div class="relative" style="width: ${width}px; height: ${height}px;">
            <svg width="${width}" height="${height}" class="absolute top-0 left-0 overflow-visible">
              <line x1="${paddingX}" y1="${height - paddingY}" x2="${width - paddingX}" y2="${height - paddingY}" stroke="#e5e7eb" stroke-dasharray="4 4" />
              <line x1="${paddingX}" y1="${paddingY}" x2="${width - paddingX}" y2="${paddingY}" stroke="#e5e7eb" stroke-dasharray="4 4" />
              <path d="${pathData}" fill="none" stroke="${color}" stroke-width="2.5" class="drop-shadow-sm" />
              ${circlesHtml}
            </svg>
          </div>
          <div class="flex justify-between w-full px-4 mt-1 text-xs text-gray-400 font-medium">${labelsHtml}</div>
        </div>
      `;
    }

    function renderReadonlyNutritionTable(dist) {
      const rows = ['milk_low', 'grain', 'meat_low', 'meat_med', 'veggie', 'fruit', 'oil'].map(catId => {
        const category = FOOD_CATEGORIES.find(c => c.id === catId);
        const d = dist?.[catId] || {};
        let total = 0;
        let cells = MEAL_TIMES.map(meal => {
          const val = d[meal] || '';
          if(val) total += Number(val);
          return `<td class="px-2 py-1.5 text-center text-xs text-slate-700 border-r border-slate-200">${val}</td>`;
        }).join('');
        
        if (total === 0) return ''; 
        
        return `<tr class="border-b border-slate-200"><td class="px-3 py-1.5 text-xs font-bold text-slate-800 border-r border-slate-200 bg-slate-50">${category?.label}</td>${cells}<td class="px-3 py-1.5 text-center text-xs font-bold text-orange-600 bg-orange-50">${total}</td></tr>`;
      }).filter(row => row !== '').join('');

      if (!rows) return '<div class="text-xs text-slate-400 py-2 px-1">該筆紀錄無具體餐次分配數值。</div>';

      return `
        <div class="overflow-x-auto rounded border border-slate-200 mt-3">
          <table class="min-w-full border-collapse">
            <thead class="bg-slate-100">
              <tr>
                <th class="px-3 py-2 text-left text-xs font-bold text-slate-700 border-r border-slate-200 border-b w-[15%]">分類</th>
                ${MEAL_TIMES.map(m => `<th class="px-2 py-2 text-center text-xs font-bold text-slate-700 border-r border-slate-200 border-b w-[12%]">${m}</th>`).join('')}
                <th class="px-3 py-2 text-center text-xs font-bold text-orange-700 border-b border-slate-200 bg-orange-50 w-[13%]">總計</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    // 全域共用的多選 Checkbox 與其他項目產生器
    function renderCheckboxes(patientId, options, selectedArr, path, color) {
        let arr = Array.isArray(selectedArr) ? selectedArr : [];
        let html = `<div class="flex flex-col gap-2 mt-3"><div class="flex flex-wrap gap-2">`;
        options.forEach(opt => {
            const checked = arr.includes(opt) ? 'checked' : '';
            html += `<label class="flex items-center gap-1.5 cursor-pointer text-sm font-medium bg-${color}-50 border border-${color}-200 px-2 py-1 rounded hover:bg-${color}-100 transition-colors"><input type="checkbox" value="${opt}" ${checked} class="w-3.5 h-3.5 text-${color}-600 rounded border-${color}-300 focus:ring-${color}-500 cursor-pointer" onchange="toggleArrayItem('${patientId}', '${path}', this.value, this)"><span class="text-${color}-800">${opt}</span></label>`;
        });
        html += `</div>`;
        const otherItems = arr.filter(a => !options.includes(a)).join('、');
        html += `<div class="flex items-center gap-2 text-sm font-medium mt-1 border-t border-${color}-100 pt-2"><span class="text-slate-500 shrink-0 text-xs">其他項目:</span><input type="text" placeholder="點擊輸入 (以頓號或逗號分隔)..." class="flex-1 bg-white border border-slate-200 px-2 py-1.5 rounded outline-none focus:border-${color}-400 focus:ring-1 focus:ring-${color}-400 text-${color}-800 placeholder-slate-400" value="${otherItems}" onblur="updateOtherArrayItems('${patientId}', '${path}', '${options.join('|')}', this.value)"></div></div>`;
        return html;
    }

    window.render = function() {

      else if (window.appState.view === 'addCase') html += `<main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 w-full fade-in">${renderAddCase()}</main>`;
      else html += `<main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 w-full fade-in">${renderDetail()}</main>`;
      appContainer.innerHTML = html;
      lucide.createIcons();

    window.addFormCalcAge = function() { const dobStr = document.getElementById('add_dob').value; if (!dobStr) return; const dob = new Date(dobStr); const today = new Date(); let age = today.getFullYear() - dob.getFullYear(); const m = today.getMonth() - dob.getMonth(); if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--; document.getElementById('add_age').value = age; };
    window.addFormCalcBMI = function() { const h = parseFloat(document.getElementById('add_height').value); const w = parseFloat(document.getElementById('add_weight').value); if (h && w) document.getElementById('add_bmi').value = (w / ((h/100) * (h/100))).toFixed(1); };
    window.addFormCalcBPStage = function() { const sys = parseInt(document.getElementById('add_sys').value); const dia = parseInt(document.getElementById('add_dia').value); const output = document.getElementById('add_bpStage'); output.classList.remove('text-red-600', 'bg-red-50'); if (!sys || !dia) { output.value = ""; return; } if (sys >= 160 || dia >= 100) { output.value = "高血壓第2期"; output.classList.add('text-red-600', 'bg-red-50'); } else if (sys >= 140 || dia >= 90) { output.value = "高血壓第1期"; output.classList.add('text-red-600', 'bg-red-50'); } else if (sys >= 120 || dia >= 80) { output.value = "高血壓前期"; } else { output.value = "正常"; } };
    window.addFormCalcASMIndex = function() { const h = parseFloat(document.getElementById('add_height').value); const asm = parseFloat(document.getElementById('add_asm').value); if (h && asm) { document.getElementById('add_asmIndex').value = (asm / ((h/100) * (h/100))).toFixed(2); } else { document.getElementById('add_asmIndex').value = ""; } addFormCalcSarcopenia();  };
    window.addFormCalcSarcopenia = function() { const gender = document.getElementById('add_gender').value; const grip = parseFloat(document.getElementById('add_grip').value); const asmIndex = parseFloat(document.getElementById('add_asmIndex').value); const gripStatusEl = document.getElementById('add_gripStatus'); const muscleStatusEl = document.getElementById('add_muscleStatus'); const summaryEl = document.getElementById('add_sarcopeniaSummary'); gripStatusEl.classList.remove('text-red-600', 'bg-red-50'); muscleStatusEl.classList.remove('text-red-600', 'bg-red-50'); summaryEl.classList.remove('text-red-600', 'bg-red-50', 'font-bold'); if (!gender) { if (!isNaN(grip)) gripStatusEl.value = "請先選擇性別"; if (!isNaN(asmIndex)) muscleStatusEl.value = "請先選擇性別"; summaryEl.value = ""; return; } let gripCutoff = (gender === '男') ? 28 : 18; let asmCutoff = (gender === '男') ? 7.0 : 5.4; let isGripLow = false, isMuscleLow = false; if (!isNaN(grip)) { if (grip < gripCutoff) { gripStatusEl.value = "異常"; gripStatusEl.classList.add('text-red-600', 'bg-red-50'); isGripLow = true; } else { gripStatusEl.value = "正常"; } } else { gripStatusEl.value = ""; } if (!isNaN(asmIndex)) { if (asmIndex < asmCutoff) { muscleStatusEl.value = "異常"; muscleStatusEl.classList.add('text-red-600', 'bg-red-50'); isMuscleLow = true; } else { muscleStatusEl.value = "正常"; } } else { muscleStatusEl.value = ""; } if (gripStatusEl.value && gripStatusEl.value !== "請先選擇性別" && muscleStatusEl.value && muscleStatusEl.value !== "請先選擇性別") { if (isGripLow && isMuscleLow) { summaryEl.value = "肌少症確診"; summaryEl.classList.add('text-red-600', 'bg-red-50', 'font-bold'); } else if (isGripLow || isMuscleLow) { summaryEl.value = "肌少症可能 (單項異常)"; summaryEl.classList.add('text-red-600', 'bg-red-50'); } else { summaryEl.value = "正常"; } } else { summaryEl.value = ""; } };
    
    window.submitNewCase = function() {
        const form = document.getElementById('addCaseForm');
        if (!form.reportValidity()) return;
        const name = document.getElementById('add_name').value;
        const clinic = document.getElementById('add_clinic').value;

        const newPatient = {
            id: id, name: name, clinicName: clinic, birthday: document.getElementById('add_dob').value, gender: document.getElementById('add_gender').value, age: Number(document.getElementById('add_age').value), phone: document.getElementById('add_phone').value, intakeDate: new Date().toISOString().split('T')[0], systolic: Number(document.getElementById('add_sys').value), diastolic: Number(document.getElementById('add_dia').value), bpStage: document.getElementById('add_bpStage').value, sugar: Number(document.getElementById('add_sugar').value), hbA1c: Number(document.getElementById('add_hbA1c').value), chol: Number(document.getElementById('add_chol').value), tg: Number(document.getElementById('add_tg').value), ldl: Number(document.getElementById('add_ldl').value), meds: getChecked('add_meds'), otherDiseases: document.getElementById('add_otherDiseases').value, criteria: getChecked('add_criteria'), ckdStage: document.getElementById('add_ckd').value, ckmStage: document.getElementById('add_ckm').value, height: Number(document.getElementById('add_height').value), weight: Number(document.getElementById('add_weight').value), waist: Number(document.getElementById('add_waist').value), bmi: Number(document.getElementById('add_bmi').value), bodyFat: Number(document.getElementById('add_bodyFat').value), asm: Number(document.getElementById('add_asm').value), asmIndex: Number(document.getElementById('add_asmIndex').value), gripStrength: Number(document.getElementById('add_grip').value), sarcopeniaResult: document.getElementById('add_sarcopeniaSummary').value, professionalNeeds: needs, smartBandWillingness: document.querySelector('input[name="add_smartBand"]:checked')?.value || '未填寫', cgmInstallDate: document.getElementById('add_cgmDate').value, smartBandDate: '', bodyType: '標準型', photos: [],
            history: [{ month: '初始', date: new Date().toISOString().split('T')[0], weight: Number(document.getElementById('add_weight').value), bodyFat: Number(document.getElementById('add_bodyFat').value), sbp: Number(document.getElementById('add_sys').value), dbp: Number(document.getElementById('add_dia').value), sugar: Number(document.getElementById('add_sugar').value), hbA1c: Number(document.getElementById('add_hbA1c').value), chol: Number(document.getElementById('add_chol').value), tg: Number(document.getElementById('add_tg').value), ldl: Number(document.getElementById('add_ldl').value) }],
            followUps: [{ id: Date.now(), date: new Date().toISOString().split('T')[0], type: '初訪', content: document.getElementById('add_note').value || '完成收案表填寫', recorder: '系統自動建立' }],
            caseManagerData: { meta: JSON.parse(JSON.stringify(baseMeta)) }, exerciseData: { habit: '', freq: '', duration: '', items: [], barriers: [], lessons: [], meta: JSON.parse(JSON.stringify(baseMeta)) }, nutritionData: { habits: {}, diabetes: {}, goal: '', dailySuggestedKcal: 0, distribution: {}, planHistory: [], records: [], meta: JSON.parse(JSON.stringify(baseMeta)) }, socialWorkData: { familyStatus: {}, emergencyContact: {}, welfare: {}, treatment: {}, meta: JSON.parse(JSON.stringify(baseMeta)) }, psychData: { bsrs: [0,0,0,0,0,0], isi: [0,0,0,0,0,0,0], records: [], meta: JSON.parse(JSON.stringify(baseMeta)) }
