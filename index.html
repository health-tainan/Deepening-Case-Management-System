                        <div><label class="block text-sm font-semibold text-slate-700 mb-1">ASM 指標 (kg/m²)</label><input type="number" id="add_asmIndex" step="0.01" readonly class="w-full px-3 py-2 border border-slate-200 bg-slate-100 rounded-lg text-slate-600 outline-none"></div>
                        <div><label class="block text-sm font-semibold text-slate-700 mb-1">手握力 (kg)</label><input type="number" id="add_grip" step="0.1" oninput="addFormCalcSarcopenia()" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"></div>
                        <div><label class="block text-sm font-semibold text-slate-700 mb-1">握力判定 (自動)</label><input type="text" id="add_gripStatus" readonly class="w-full px-3 py-2 border border-slate-200 bg-slate-100 rounded-lg text-slate-600 font-bold outline-none"></div>
                        <div><label class="block text-sm font-semibold text-slate-700 mb-1">肌肉量判定 (自動)</label><input type="text" id="add_muscleStatus" readonly class="w-full px-3 py-2 border border-slate-200 bg-slate-100 rounded-lg text-slate-600 font-bold outline-none"></div>
                        <div class="md:col-span-2"><label class="block text-sm font-semibold text-slate-700 mb-1">肌少症總結 (自動)</label><input type="text" id="add_sarcopeniaSummary" readonly class="w-full px-3 py-2 border border-slate-200 bg-slate-100 rounded-lg text-slate-600 font-bold outline-none"></div>
                    </div>
                </section>
                <section><h3 class="text-lg font-bold text-blue-700 mb-4 flex items-center gap-2 border-l-4 border-blue-600 pl-3 bg-blue-50/50 py-1.5 rounded-r-lg">專業需求評估與紀錄</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="md:col-span-2"><label class="block text-sm font-semibold text-slate-700 mb-2">需求評估項目 (可複選) <span class="text-xs text-red-500 font-normal">(個別分數低於5分或醫師評估轉介)</span></label><div class="flex flex-wrap gap-4 p-3 border border-slate-200 rounded-lg bg-slate-50"><label class="flex items-center gap-2 cursor-pointer text-sm font-medium"><input type="checkbox" name="add_needs" value="運動計畫" class="w-4 h-4 text-blue-600 rounded"> 運動</label><label class="flex items-center gap-2 cursor-pointer text-sm font-medium"><input type="checkbox" name="add_needs" value="營養" class="w-4 h-4 text-blue-600 rounded"> 營養</label><label class="flex items-center gap-2 cursor-pointer text-sm font-medium"><input type="checkbox" name="add_needs" value="睡眠" class="w-4 h-4 text-blue-600 rounded"> 睡眠</label><label class="flex items-center gap-2 cursor-pointer text-sm font-medium"><input type="checkbox" name="add_needs" value="壓力管理" class="w-4 h-4 text-blue-600 rounded"> 壓力管理</label><label class="flex items-center gap-2 cursor-pointer text-sm font-medium"><input type="checkbox" name="add_needs" value="危害物質(菸酒)" class="w-4 h-4 text-blue-600 rounded"> 危害物質(菸酒)</label><label class="flex items-center gap-2 cursor-pointer text-sm font-medium"><input type="checkbox" name="add_needs" value="社會資源" class="w-4 h-4 text-blue-600 rounded"> 社會資源</label><label class="flex items-center gap-2 cursor-pointer text-sm font-medium w-full sm:w-auto mt-2 sm:mt-0"><input type="checkbox" id="add_needs_other_check" class="w-4 h-4 text-blue-600 rounded"> 其他: <input type="text" id="add_needs_other_text" placeholder="請輸入" class="border-b border-slate-300 bg-transparent px-2 focus:outline-none focus:border-blue-500"></label></div></div>
                        <div><label class="block text-sm font-semibold text-slate-700 mb-2">智慧手環配戴意願 <span class="text-xs text-slate-400 font-normal">(後續發放)</span></label><div class="flex gap-4 p-3 border border-slate-200 rounded-lg bg-slate-50"><label class="flex items-center gap-2 cursor-pointer text-sm font-medium"><input type="radio" name="add_smartBand" value="有意願" class="w-4 h-4 text-blue-600 focus:ring-blue-500"> 有意願</label><label class="flex items-center gap-2 cursor-pointer text-sm font-medium"><input type="radio" name="add_smartBand" value="無意願" class="w-4 h-4 text-blue-600 focus:ring-blue-500"> 無意願</label></div></div>
                        <div><label class="block text-sm font-semibold text-slate-700 mb-1">CGM 安裝日 <span class="text-xs text-slate-400 font-normal">(診所端協助安裝)</span></label><input type="date" id="add_cgmDate" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"></div>
                        <div class="md:col-span-2"><label class="block text-sm font-semibold text-slate-700 mb-1">備註 / 特殊狀況說明</label><textarea id="add_note" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white placeholder-slate-400" placeholder="請輸入額外備註..."></textarea></div>
                    </div>
                </section>
                <div class="flex flex-col sm:flex-row justify-end gap-4 mt-8 pt-6 border-t border-slate-200">
                    <button type="button" onclick="document.getElementById('addCaseForm').reset()" class="px-6 py-3 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 font-medium transition-colors shadow-sm">清空表格</button>
                    <button type="button" onclick="submitNewCase()" class="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium transition-colors shadow-md flex items-center justify-center gap-2 text-lg"><i data-lucide="save" class="w-5 h-5"></i> 確認新增並儲存個案</button>
                </div>
            </form>
        </div>
        `;
    }

    function renderDetail() {
      const patient = window.appState.patients.find(p => p.id === window.appState.selectedPatientId);
      if (!patient) return '';
      const photoUrl = (patient.photos && patient.photos.length > 0) ? patient.photos[0].url : null;
      let tabsHtml = ROLES.map(role => {
        const isActive = window.appState.activeTab === role.id;
        return `<button onclick="switchTab('${role.id}')" class="flex-1 min-w-[120px] py-4 px-2 flex flex-col items-center justify-center gap-2 transition-all border-b-2 ${isActive ? `${role.border} ${role.bg} ${role.color}` : 'border-transparent text-slate-500 hover:bg-slate-50 hover:text-slate-700'}"><i data-lucide="${role.icon}" class="w-6 h-6 ${isActive ? '' : 'text-slate-400'}"></i><span class="text-sm font-bold">${role.name}</span></button>`;
      }).join('');

      let tabContentHtml = '';
      if (window.appState.activeTab === 'CaseManager') tabContentHtml = renderCaseManager(patient);
      if (window.appState.activeTab === 'Coach') tabContentHtml = renderCoach(patient);
      if (window.appState.activeTab === 'Nutritionist') tabContentHtml = renderNutritionist(patient);
      if (window.appState.activeTab === 'SocialWorker') tabContentHtml = renderSocialWorker(patient);
      if (window.appState.activeTab === 'Psychologist') tabContentHtml = renderPsychologist(patient);

      return `
        <div class="space-y-4 fade-in">
          <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 gap-4">
            <button onclick="navigateTo('list')" class="flex items-center text-slate-500 hover:text-slate-800 transition-colors font-medium bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm shrink-0"><i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> 返回名單</button>
            <div class="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-end">
              <span id="last-saved-time" class="text-sm text-slate-500 flex items-center gap-1"><i data-lucide="clock" class="w-4 h-4"></i> 最後更新: ${window.appState.lastSaved}</span>
              <button onclick="exportToCSV()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-indigo-700 shadow-sm text-sm font-medium transition-colors"><i data-lucide="download" class="w-4 h-4"></i> 匯出本頁 CSV</button>
              <button onclick="syncToCloud()" class="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-blue-700 shadow-sm text-sm font-medium transition-colors"><i data-lucide="cloud-upload" class="w-4 h-4"></i> 強制同步</button>
            </div>
          </div>
          <div id="export-content" class="space-y-4 w-full">
              <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col md:flex-row gap-6 items-start">
                <div class="flex items-start gap-5 min-w-[300px]">
                  <div class="relative group cursor-pointer" onclick="triggerPhotoUpload()">
                    ${photoUrl ? `<img src="${photoUrl}" alt="profile" class="w-20 h-20 rounded-full object-cover border-4 border-slate-50 shadow-sm" />` : `<div class="w-20 h-20 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-3xl font-bold border-4 border-slate-50 shadow-sm">${patient.name.charAt(0)}</div>`}
                    <div class="absolute inset-0 bg-black/40 rounded-full opacity-0 group-hover:opacity-100 flex flex-col items-center justify-center transition-opacity"><i data-lucide="camera" class="w-6 h-6 text-white mb-1"></i><span class="text-[10px] text-white font-bold">更換照片</span></div>
                    <div class="absolute bottom-0 right-0 w-5 h-5 rounded-full border-2 border-white ${patient.gender === '女' ? 'bg-pink-400' : 'bg-blue-400'}"></div><input type="file" id="photo-upload-input" class="hidden" accept="image/*" onchange="handlePhotoUpload(event, '${patient.id}')">
                  </div>
                  <div>
                    <div class="flex items-end gap-3 mb-1 flex-wrap"><h2 class="text-2xl font-bold text-slate-800">${patient.name}</h2><span class="text-slate-500 font-medium mb-0.5">${patient.id}</span><span class="bg-purple-100 text-purple-700 text-xs px-2 py-0.5 rounded-full mb-1 border border-purple-200">${patient.clinicName}</span></div>
                    <div class="text-sm text-slate-600 space-y-1 mt-2"><div class="flex items-center gap-2"><i data-lucide="calendar" class="w-4 h-4 text-slate-400"></i> ${patient.birthday} (${patient.age}歲)</div><div class="flex items-center gap-2"><i data-lucide="phone" class="w-4 h-4 text-slate-400"></i> ${patient.phone || '未提供電話'}</div></div>
                  </div>
                </div>
                <div class="flex-1 grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-6 gap-4 w-full">
                  <div class="p-3 rounded-lg border bg-slate-50 border-slate-100 flex flex-col justify-center"><div class="text-xs font-medium text-slate-500 mb-1">身高 / 體重</div><div class="text-lg font-bold text-slate-800"><span class="editable-area px-1 rounded inline-block" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'height', this)">${patient.height}</span><span class="text-sm font-normal text-slate-500">cm</span> / <span class="editable-area px-1 rounded inline-block" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'weight', this)">${patient.weight}</span><span class="text-sm font-normal text-slate-500">kg</span></div></div>
                  <div class="p-3 rounded-lg border ${patient.bmi > 24 || patient.bodyFat > 30 ? 'bg-red-50 border-red-100' : 'bg-slate-50 border-slate-100'} flex flex-col justify-center"><div class="text-xs font-medium text-slate-500 mb-1">BMI / 體脂肪</div><div class="text-lg font-bold ${patient.bmi > 24 || patient.bodyFat > 30 ? 'text-red-700' : 'text-slate-800'}"><span class="inline-block">${patient.bmi}</span> / <span class="editable-area px-1 rounded inline-block" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'bodyFat', this)">${patient.bodyFat || '-'}</span><span class="text-sm font-normal text-slate-500">%</span></div></div>
                  <div class="p-3 rounded-lg border ${(patient.systolic >= 140 || patient.diastolic >= 90) ? 'bg-red-50 border-red-100' : 'bg-slate-50 border-slate-100'} flex flex-col justify-center"><div class="text-xs font-medium text-slate-500 mb-1">血壓 (收縮/舒張)</div><div class="text-lg font-bold ${(patient.systolic >= 140 || patient.diastolic >= 90) ? 'text-red-700' : 'text-slate-800'}"><span class="editable-area px-1 rounded inline-block" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'systolic', this)">${patient.systolic}</span>/<span class="editable-area px-1 rounded inline-block" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'diastolic', this)">${patient.diastolic}</span> <span class="text-xs font-normal text-red-600 block sm:inline mt-1 sm:mt-0">${patient.bpStage || ''}</span></div></div>
                  <div class="p-3 rounded-lg border ${patient.hbA1c >= 6.5 || patient.sugar >= 126 ? 'bg-red-50 border-red-100' : 'bg-slate-50 border-slate-100'} flex flex-col justify-center"><div class="text-xs font-medium text-slate-500 mb-1">空腹血糖 / 糖化血色素</div><div class="text-lg font-bold ${patient.hbA1c >= 6.5 || patient.sugar >= 126 ? 'text-red-700' : 'text-slate-800'}"><span class="editable-area px-1 rounded inline-block" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'sugar', this)">${patient.sugar}</span> / <span class="editable-area px-1 rounded inline-block" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'hbA1c', this)">${patient.hbA1c}</span><span class="text-sm font-normal text-slate-500">%</span></div></div>
                  <div class="p-3 rounded-lg border ${(patient.chol >= 200 || patient.tg >= 150) ? 'bg-red-50 border-red-100' : 'bg-slate-50 border-slate-100'} flex flex-col justify-center"><div class="text-xs font-medium text-slate-500 mb-1">總膽固醇 / 三酸甘油酯</div><div class="text-lg font-bold ${(patient.chol >= 200 || patient.tg >= 150) ? 'text-red-700' : 'text-slate-800'}"><span class="editable-area px-1 rounded inline-block" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'chol', this)">${patient.chol || '-'}</span> / <span class="editable-area px-1 rounded inline-block" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'tg', this)">${patient.tg || '-'}</span></div></div>
                  <div class="p-3 rounded-lg border ${patient.ldl >= 130 ? 'bg-red-50 border-red-100' : 'bg-slate-50 border-slate-100'} flex flex-col justify-center"><div class="text-xs font-medium text-slate-500 mb-1">低密度脂蛋白</div><div class="text-lg font-bold ${patient.ldl >= 130 ? 'text-red-700' : 'text-slate-800'}"><span class="editable-area px-1 rounded inline-block" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'ldl', this)">${patient.ldl || '-'}</span> <span class="text-xs font-normal text-slate-500">mg/dL</span></div></div>
                </div>
              </div>
              <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden"><div class="flex overflow-x-auto hide-scrollbar border-b border-slate-200 bg-white">${tabsHtml}</div><div class="p-6 bg-slate-50/50 min-h-[500px]">${tabContentHtml}</div></div>
          </div>
        </div>
      `;
    }

    function renderCaseManager(patient) {
      let recordsHtml = (patient.followUps || []).map((r, index) => `
        <div class="p-4 border border-slate-200 bg-white rounded-lg flex gap-4 shadow-sm relative group">
          <button onclick="deleteRecordItem('followUps', ${index})" class="absolute top-2 right-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          <div class="min-w-[100px]"><div class="text-sm font-bold text-slate-700 editable-area px-1 -ml-1 rounded" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'followUps.${index}.date', this)">${r.date}</div><div class="text-xs text-slate-500 mt-1"><i data-lucide="user" class="w-3 h-3 inline mr-1"></i>${r.recorder}</div></div>
          <div class="flex-1 border-l border-slate-100 pl-4"><span class="inline-block px-2 py-0.5 bg-blue-100 text-blue-700 text-xs rounded mb-1 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'followUps.${index}.type', this)">${r.type}</span><div class="text-sm text-slate-700 editable-area p-1 -ml-1 mt-1 rounded min-h-[3rem] border border-transparent hover:border-slate-200 whitespace-pre-wrap" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'followUps.${index}.content', this)">${r.content}</div></div>
        </div>
      `).join('');
      const NEEDS_OPTS = ['運動計畫', '營養', '睡眠', '壓力管理', '危害物質(菸酒)', '社會資源'];
      const MEDS_OPTS = ['高血壓', '糖尿病', '高血脂'];

      return `
        <div class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="md:col-span-2 bg-white p-5 rounded-xl border border-slate-200 shadow-sm"><h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="clipboard-check" class="w-5 h-5 text-blue-600"></i> 疾病與收案狀態</h3>
              <div class="grid grid-cols-2 gap-4">
                <div><label class="text-xs text-slate-500 block mb-1">收案條件 (可點擊文字編輯)</label><div class="flex gap-2 flex-wrap"><span class="bg-blue-100 text-blue-800 text-sm px-3 py-1.5 rounded font-medium editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'criteria', this)">${Array.isArray(patient.criteria) ? patient.criteria.join('、') : (patient.criteria || '無')}</span></div></div>
                <div><label class="text-xs text-slate-500 block mb-1">其他共病</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-2 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'otherDiseases', this)">${patient.otherDiseases || '無'}</div></div>
                <div><label class="text-xs text-slate-500 block mb-1">慢性腎臟病 (CKD) 分期</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-2 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'ckdStage', this)">${patient.ckdStage || '未判定'}</div></div>
                <div><label class="text-xs text-slate-500 block mb-1">心血管健康 (CKM) 分期</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-2 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'ckmStage', this)">${patient.ckmStage || '未判定'}</div></div>
              </div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm"><h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="watch" class="w-5 h-5 text-blue-600"></i> 科技輔具</h3>
              <div class="space-y-4">
                <div><label class="text-xs text-slate-500 block">智能手環意願</label><div class="text-sm font-medium border-b border-slate-100 pb-1 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'smartBandWillingness', this)">${patient.smartBandWillingness || '未填寫'}</div></div>
                <div><label class="text-xs text-slate-500 block">智能手環裝設日</label><div class="text-sm font-medium border-b border-slate-100 pb-1 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'smartBandDate', this)">${patient.smartBandDate || '尚未裝設'}</div></div>
                <div><label class="text-xs text-slate-500 block">連續血糖監測 (CGM) 裝設區間</label><div class="text-sm font-medium border-b border-slate-100 pb-1 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'cgmInstallDate', this)">${patient.cgmInstallDate || '尚未裝設'}</div></div>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
             <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm"><h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="test-tube" class="w-5 h-5 text-blue-600"></i> 進階數值與用藥</h3>
               <div class="grid grid-cols-2 gap-4">
                  <div class="col-span-2">
                    <label class="text-xs text-slate-500 block mb-1">三高用藥 (勾選即時儲存)</label>
                    ${renderCheckboxes(patient.id, MEDS_OPTS, patient.meds, 'meds', 'blue')}
                  </div>
                  <div class="col-span-2"><label class="text-xs text-slate-500 block mb-1">腰圍 (cm)</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-2 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'waist', this)">${patient.waist || '-'}</div></div>
               </div>
             </div>
             <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm"><h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="target" class="w-5 h-5 text-blue-600"></i> 專業需求評估</h3>
               <div class="space-y-4"><div><label class="text-xs text-slate-500 block mb-2">轉介/需求項目 (勾選即時儲存)</label>${renderCheckboxes(patient.id, NEEDS_OPTS, patient.professionalNeeds, 'professionalNeeds', 'blue')}</div></div>
             </div>
          </div>
          <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-5 gap-4 border-b border-slate-100 pb-4"><h3 class="text-lg font-bold text-slate-800 flex items-center gap-2"><i data-lucide="trending-up" class="w-5 h-5 text-blue-600"></i> 三高與體脂數值趨勢紀錄</h3><div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200 flex-wrap"><span class="text-xs font-bold text-slate-500">新增紀錄:</span><input type="date" id="history_date" class="text-sm px-2 py-1 border border-slate-300 rounded outline-none focus:border-blue-500" value="${new Date().toISOString().split('T')[0]}"><input type="text" id="history_label" placeholder="標籤 (如: 追蹤1)" class="text-sm px-2 py-1 border border-slate-300 rounded outline-none focus:border-blue-500 w-28"><button onclick="saveMetricsHistory()" class="text-sm bg-blue-600 text-white hover:bg-blue-700 px-3 py-1 rounded flex items-center gap-1 font-bold transition-colors shadow-sm"><i data-lucide="save" class="w-4 h-4"></i> 儲存目前數據</button></div></div>
            <div class="flex flex-wrap gap-4 justify-around mb-6">
              ${renderTrendChart(patient.history, 'sbp', '#ef4444', '收縮壓', 'mmHg')}${renderTrendChart(patient.history, 'sugar', '#3b82f6', '空腹血糖', 'mg/dL')}${renderTrendChart(patient.history, 'hbA1c', '#8b5cf6', '糖化血色素', '%')}${renderTrendChart(patient.history, 'chol', '#f59e0b', '總膽固醇', 'mg/dL')}${renderTrendChart(patient.history, 'tg', '#14b8a6', '三酸甘油酯', 'mg/dL')}${renderTrendChart(patient.history, 'ldl', '#6366f1', '低密度脂蛋白', 'mg/dL')}${renderTrendChart(patient.history, 'weight', '#10b981', '體重', 'kg')}${renderTrendChart(patient.history, 'bodyFat', '#ec4899', '體脂肪', '%')}
            </div>
            <div class="mt-4 pt-4 border-t border-slate-100"><h4 class="text-sm font-bold text-slate-700 mb-2">已儲存之歷史紀錄</h4>
                <div class="overflow-x-auto rounded border border-slate-200"><table class="min-w-full border-collapse text-xs text-slate-600"><thead class="bg-slate-50 border-b border-slate-200"><tr><th class="px-3 py-2 text-left font-bold text-slate-700">日期 / 標籤</th><th class="px-2 py-2 text-center font-bold text-slate-700 border-l border-slate-200">收縮/舒張</th><th class="px-2 py-2 text-center font-bold text-slate-700 border-l border-slate-200">血糖/HbA1c</th><th class="px-2 py-2 text-center font-bold text-slate-700 border-l border-slate-200">總膽固醇/TG/LDL</th><th class="px-2 py-2 text-center font-bold text-slate-700 border-l border-slate-200">體重/體脂</th><th class="px-3 py-2 text-right font-bold text-slate-700 border-l border-slate-200">操作</th></tr></thead><tbody>${(patient.history || []).map((h, i) => `<tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors"><td class="px-3 py-2 font-medium text-slate-800">${h.date} <span class="text-slate-400 font-normal">(${h.month})</span></td><td class="px-2 py-2 text-center border-l border-slate-100">${h.sbp || '-'}/${h.dbp || '-'}</td><td class="px-2 py-2 text-center border-l border-slate-100">${h.sugar || '-'}/${h.hbA1c || '-'}</td><td class="px-2 py-2 text-center border-l border-slate-100">${h.chol || '-'}/${h.tg || '-'}/${h.ldl || '-'}</td><td class="px-2 py-2 text-center border-l border-slate-100">${h.weight || '-'}kg / ${h.bodyFat || '-'}%</td><td class="px-3 py-2 text-right border-l border-slate-100"><button onclick="deleteRecordItem('history', ${i})" class="text-slate-400 hover:text-red-500 transition-colors bg-white hover:bg-red-50 p-1 rounded border border-slate-200 shadow-sm"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button></td></tr>`).join('')}</tbody></table></div>${!(patient.history && patient.history.length > 0) ? `<div class="text-center text-slate-400 py-4 text-xs italic">尚無歷史紀錄</div>` : ''}
            </div>
          </div>
          <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm"><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold text-slate-800 flex items-center gap-2"><i data-lucide="history" class="w-5 h-5 text-blue-600"></i> 個案追蹤紀錄</h3><button onclick="addNewRecord('followUp')" class="text-sm bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-1.5 rounded-lg flex items-center gap-1 font-medium transition-colors"><i data-lucide="plus" class="w-4 h-4"></i> 新增紀錄</button></div><div class="space-y-3">${recordsHtml.length > 0 ? recordsHtml : '<div class="text-center text-slate-400 py-4 text-sm">尚無紀錄</div>'}</div></div>
          ${renderTabMeta(patient.id, 'caseManagerData.meta', patient.caseManagerData?.meta)}
        </div>
      `;
    }

    function renderCoach(patient) {
      const d = patient.exerciseData || {};
      const genSelect = (options, current, path) => `<select class="custom-select w-full text-sm font-medium bg-slate-50 border border-slate-200 rounded p-2 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none" onchange="handleContentUpdate('${patient.id}', '${path}', this)">${options.map(o => `<option value="${o}" ${o === current ? 'selected' : ''}>${o}</option>`).join('')}</select>`;
      const renderMiniCheckboxes = (lessonIdx, type, options, selectedArr) => {
          let arr = Array.isArray(selectedArr) ? selectedArr : []; let path = `exerciseData.lessons.${lessonIdx}.${type}`; let html = `<div class="flex flex-wrap gap-1.5 mt-1">`;
          options.forEach(opt => { const checked = arr.includes(opt) ? 'checked' : ''; html += `<label class="flex items-center gap-1 cursor-pointer text-[10px] font-medium bg-slate-50 border border-slate-200 px-1.5 py-0.5 rounded hover:bg-slate-100 transition-colors"><input type="checkbox" value="${opt}" ${checked} class="w-3 h-3 text-green-600 rounded border-slate-300 focus:ring-green-500 cursor-pointer" onchange="toggleArrayItem('${patient.id}', '${path}', this.value, this)"><span class="text-slate-600">${opt}</span></label>`; });
          return html + `</div>`;
      };
      const AEROBIC_OPTS = ['跑步機', '腳踏車/飛輪', '滑步/橢圓機', '徒手有氧', '游泳/水中有氧'];
      const STRENGTH_OPTS = ['上肢(推/拉)', '下肢(深蹲/硬舉)', '核心穩定', '全身協調', '機械器材', '自由重量'];

      const lessonsHtml = (d.lessons || []).map((lesson, idx) => {
        const l_photos = lesson.photos || []; const l_files = lesson.files || []; const uniqueId = `lesson-${idx}`; const dataPath = `exerciseData.lessons.${idx}`;
        const photosHtml = l_photos.map(p => `<div class="relative group inline-block mr-2 mb-2"><img src="${p.url}" class="w-12 h-12 object-cover rounded border border-slate-200 shadow-sm cursor-pointer hover:shadow-md transition-shadow" onclick="window.open('${p.url}')"><button onclick="removeTabAttachment('${patient.id}', '${dataPath}', 'photos', ${p.id})" class="absolute -top-1.5 -right-1.5 bg-red-500 hover:bg-red-600 text-white rounded-full p-0.5 opacity-0 group-hover:opacity-100 transition-opacity shadow-sm"><i data-lucide="x" class="w-2.5 h-2.5"></i></button></div>`).join('');
        const filesHtml = l_files.map(f => `<div class="flex items-center justify-between bg-white border border-slate-200 px-2 py-1 rounded shadow-sm text-xs hover:border-blue-400 transition-colors cursor-pointer mb-1 w-full" onclick="window.open('${f.url}')"><div class="flex items-center gap-1.5 overflow-hidden"><i data-lucide="file-text" class="w-3 h-3 text-blue-500 shrink-0"></i><span class="truncate text-slate-700 font-medium max-w-[120px]">${f.name}</span></div><button onclick="event.stopPropagation(); removeTabAttachment('${patient.id}', '${dataPath}', 'files', ${f.id})" class="text-slate-400 hover:text-red-500 ml-1 shrink-0 transition-colors rounded hover:bg-red-50"><i data-lucide="trash-2" class="w-3 h-3"></i></button></div>`).join('');

        return `<div class="w-72 border rounded-xl p-4 flex flex-col relative group shadow-sm flex-shrink-0 ${lesson.completed ? 'bg-green-50/50 border-green-300' : 'bg-white border-slate-200'}">
          <button onclick="deleteRecordItem('exerciseData.lessons', ${idx})" class="absolute top-2 right-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          <div class="flex justify-between items-center mb-3 border-b border-slate-100 pb-2"><span class="text-sm font-black ${lesson.completed ? 'text-green-700' : 'text-slate-700'}">第 ${lesson.id} 堂</span><div class="flex items-center gap-3"><div class="text-xs text-slate-500 flex items-center gap-1 bg-white px-2 py-1 rounded border border-slate-100"><i data-lucide="calendar" class="w-3 h-3 text-blue-500"></i> <span class="editable-area min-w-[60px]" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'exerciseData.lessons.${idx}.date', this)">${lesson.date || '選擇日期'}</span></div><label class="flex items-center cursor-pointer" title="標示為已完成"><input type="checkbox" class="sr-only peer" ${lesson.completed ? 'checked' : ''} onchange="handleContentUpdate('${patient.id}', 'exerciseData.lessons.${idx}.completed', {value: this.checked})"><div class="w-5 h-5 border-2 rounded peer-checked:bg-green-500 peer-checked:border-green-500 border-slate-300 flex items-center justify-center transition-colors"><i data-lucide="check" class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100"></i></div></label></div></div>
          <div class="mb-3"><div class="text-xs font-bold text-slate-700 flex items-center gap-1"><i data-lucide="wind" class="w-3 h-3 text-blue-400"></i> 有氧訓練</div>${renderMiniCheckboxes(idx, 'aerobic', AEROBIC_OPTS, lesson.aerobic)}</div>
          <div class="mb-3"><div class="text-xs font-bold text-slate-700 flex items-center gap-1"><i data-lucide="dumbbell" class="w-3 h-3 text-orange-400"></i> 肌力訓練</div>${renderMiniCheckboxes(idx, 'strength', STRENGTH_OPTS, lesson.strength)}</div>
          <div class="mt-auto flex flex-col h-full"><div class="text-xs font-bold text-slate-700 flex items-center gap-1 mb-1"><i data-lucide="pen-line" class="w-3 h-3 text-slate-400"></i> 訓練備註 / 強度 / 次數</div><div class="text-xs text-slate-700 bg-slate-50 p-2 rounded-lg border border-slate-200 editable-area min-h-[3rem] leading-relaxed mb-3 flex-grow" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'exerciseData.lessons.${idx}.action', this)">${lesson.action || '請輸入詳細訓練內容、重量或學員回饋...'}</div>
          <div class="border-t border-slate-100 pt-2 mt-auto"><div class="flex gap-2 mb-2"><button onclick="document.getElementById('upload-photo-${uniqueId}').click()" class="text-[10px] font-bold bg-blue-50 border border-blue-200 hover:bg-blue-100 text-blue-700 px-2 py-1 rounded flex items-center gap-1 shadow-sm transition-colors"><i data-lucide="image-plus" class="w-3 h-3"></i> 加照片</button><button onclick="document.getElementById('upload-file-${uniqueId}').click()" class="text-[10px] font-bold bg-green-50 border border-green-200 hover:bg-green-100 text-green-700 px-2 py-1 rounded flex items-center gap-1 shadow-sm transition-colors"><i data-lucide="file-up" class="w-3 h-3"></i> 加檔案</button><input type="file" id="upload-photo-${uniqueId}" class="hidden" accept="image/*" onchange="handleTabAttachmentUpload(event, '${patient.id}', '${dataPath}', 'photos')"><input type="file" id="upload-file-${uniqueId}" class="hidden" onchange="handleTabAttachmentUpload(event, '${patient.id}', '${dataPath}', 'files')"></div>${l_photos.length > 0 ? `<div>${photosHtml}</div>` : ''}${l_files.length > 0 ? `<div class="mt-1">${filesHtml}</div>` : ''}</div></div>
        </div>`;
      }).join('');

      return `
        <div class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="md:col-span-3 bg-white p-5 rounded-xl border border-green-200 shadow-sm"><h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="dumbbell" class="w-5 h-5 text-green-600"></i> 體適能與運動狀況</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-y-4 gap-x-6"><div><label class="text-xs text-slate-500 block mb-1">運動習慣</label>${genSelect(EXERCISE_OPTIONS.habit, d.habit, 'exerciseData.habit')}</div><div><label class="text-xs text-slate-500 block mb-1">運動頻率</label>${genSelect(EXERCISE_OPTIONS.freq, d.freq, 'exerciseData.freq')}</div><div><label class="text-xs text-slate-500 block mb-1">每次運動時間</label>${genSelect(EXERCISE_OPTIONS.duration, d.duration, 'exerciseData.duration')}</div><div class="md:col-span-3"><label class="text-xs text-slate-500 block mb-1">常做運動項目 (點擊編輯)</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-2 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'exerciseData.items', this)">${Array.isArray(d.items) ? d.items.join('、') : (d.items || '無')}</div></div><div class="md:col-span-3"><label class="text-xs text-slate-500 block mb-1">阻礙運動之健康/心理問題</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-2 editable-area text-red-600" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'exerciseData.barriers', this)">${Array.isArray(d.barriers) ? d.barriers.join('、') : (d.barriers || '無明顯障礙')}</div></div></div></div>
            <div class="bg-white p-5 rounded-xl border border-green-200 shadow-sm flex flex-col justify-center"><h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="activity" class="w-5 h-5 text-green-600"></i> 肌少症評估指標</h3><div class="space-y-5"><div><div class="flex justify-between text-sm mb-1"><span class="text-slate-500">手握力 (Grip)</span> <span class="font-bold text-slate-800">${patient.gripStrength || '-'} kg</span></div><div class="w-full bg-slate-100 rounded-full h-2.5"><div class="bg-orange-400 h-2.5 rounded-full" style="width: 45%"></div></div><div class="text-[10px] text-slate-400 mt-1 text-right">${patient.gender === '男' ? '男性標準 < 28kg' : '女性標準 < 18kg'}</div></div><div><div class="flex justify-between text-sm mb-1"><span class="text-slate-500">四肢骨骼肌質量 (ASM)</span> <span class="font-bold text-slate-800">${patient.asm || '-'} kg</span></div></div><div class="pt-3 border-t border-slate-100"><div class="text-center text-sm font-bold py-2 rounded-lg ${patient.sarcopeniaResult?.includes('確診') || patient.sarcopeniaResult?.includes('可能') ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200'}"><i data-lucide="alert-triangle" class="w-4 h-4 inline mb-0.5"></i> ${patient.sarcopeniaResult || '未檢測'}</div></div></div></div>
          </div>
          <div class="bg-white p-5 rounded-xl border border-green-200 shadow-sm"><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold text-slate-800 flex items-center gap-2"><i data-lucide="list-checks" class="w-5 h-5 text-green-600"></i> 上課紀錄區塊 (勾選與附件即時儲存)</h3><button onclick="addNewRecord('lesson')" class="text-sm bg-green-50 text-green-700 hover:bg-green-100 px-3 py-1.5 rounded-lg flex items-center gap-1 font-medium transition-colors border border-green-200"><i data-lucide="plus" class="w-4 h-4"></i> 新增課表</button></div><div class="overflow-x-auto pb-4"><div class="flex gap-5 min-w-max px-1 items-stretch">${lessonsHtml}</div></div></div>
          ${renderTabMeta(patient.id, 'exerciseData.meta', d.meta)}
        </div>
      `;
    }

    function renderNutritionist(patient) {
      const d = patient.nutritionData || {};
      let tableRows = ['milk_low', 'grain', 'meat_low', 'meat_med', 'veggie', 'fruit', 'oil'].map(catId => {
        const category = FOOD_CATEGORIES.find(c => c.id === catId); const dist = d.distribution?.[catId] || {}; let total = 0;
        let cells = MEAL_TIMES.map(meal => { const val = dist[meal] || ''; if(val) total += Number(val); return `<td class="px-3 py-2 text-center text-sm text-slate-700 border-r border-slate-200 bg-white"><div class="editable-area w-full h-full p-1" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'nutritionData.distribution.${catId}.${meal}', this)">${val}</div></td>`; }).join('');
        return `<tr class="border-b border-slate-200 hover:bg-orange-50/30 transition-colors"><td class="px-4 py-3 text-sm text-slate-800 border-r border-slate-200 font-bold bg-slate-50">${category?.label}</td>${cells}<td class="px-4 py-3 text-center text-base font-black text-orange-600 bg-orange-50">${total || '-'}</td></tr>`;
      }).join('');

      let planHistoryHtml = (d.planHistory || []).map((record, index) => `
         <div class="p-4 border border-slate-200 bg-white rounded-lg shadow-sm relative group mb-4 hover:border-orange-300 transition-colors"><button onclick="deleteRecordItem('nutritionData.planHistory', ${index})" class="absolute top-2 right-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" class="w-4 h-4"></i></button><div class="flex justify-between items-center mb-3 border-b border-slate-100 pb-2"><div class="text-sm font-bold text-slate-700 flex items-center gap-2"><i data-lucide="calendar" class="w-4 h-4"></i> ${record.date}</div><div class="text-xs bg-orange-100 text-orange-800 px-3 py-1 rounded-full font-bold shadow-sm">建議熱量: ${record.kcal} kcal</div></div><div class="text-sm text-slate-700 mb-2 border-l-2 border-orange-400 pl-2"><strong>衛教目標：</strong> ${record.goal || '未設定'}</div>${renderReadonlyNutritionTable(record.distribution)}</div>
      `).join('');
      
      let recordsHtml = (d.records || []).map((r, index) => `
        <div class="p-4 border border-slate-200 bg-white rounded-xl flex gap-4 shadow-sm relative group hover:border-orange-300 transition-colors"><button onclick="deleteRecordItem('nutritionData.records', ${index})" class="absolute top-2 right-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" class="w-4 h-4"></i></button><div class="text-center min-w-[90px] pr-4 border-r border-slate-100"><div class="text-sm font-bold text-slate-700 editable-area px-1 rounded" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'nutritionData.records.${index}.date', this)">${r.date}</div><div class="text-[10px] text-slate-400 mt-2"><i data-lucide="pen-tool" class="w-3 h-3 inline mr-1"></i>${r.recorder}</div></div><div class="flex-1 pl-2"><div class="text-sm text-slate-700 leading-relaxed editable-area p-1 min-h-[3rem] border border-transparent hover:border-slate-200 rounded" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'nutritionData.records.${index}.content', this)">${r.content}</div></div></div>
      `).join('');

      return `
        <div class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-xl border border-orange-200 shadow-sm"><h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="coffee" class="w-5 h-5 text-orange-600"></i> 飲食習慣評估</h3><div class="grid grid-cols-2 gap-y-4 gap-x-6"><div><label class="text-xs text-slate-500 block mb-1">飲食來源</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-2 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'nutritionData.habits.source', this)">${d.habits?.source || '-'}</div></div><div><label class="text-xs text-slate-500 block mb-1">飲食型態</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-2 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'nutritionData.habits.dietType', this)">${d.habits?.dietType || '-'}</div></div><div><label class="text-xs text-slate-500 block mb-1">進餐頻率 (餐/日)</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-2 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'nutritionData.habits.mealsPerDay', this)">${d.habits?.mealsPerDay || '-'}</div></div><div><label class="text-xs text-slate-500 block mb-1">定時定量</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-2 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'nutritionData.habits.regularTiming', this)">${d.habits?.regularTiming || '-'}</div></div><div class="col-span-2"><label class="text-xs text-slate-500 block mb-1">臨床腸胃問題</label><div class="text-sm font-medium text-orange-700 bg-orange-50 border border-orange-100 rounded p-2 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'nutritionData.habits.giIssues', this)">${Array.isArray(d.habits?.giIssues) ? d.habits.giIssues.join('、') : (d.habits?.giIssues || '無')}</div></div></div></div>
            <div class="bg-white p-5 rounded-xl border border-orange-200 shadow-sm flex flex-col"><h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="shield-alert" class="w-5 h-5 text-orange-600"></i> 糖尿病管理與衛教目標</h3><div class="grid grid-cols-2 gap-y-4 gap-x-6 mb-4"><div><label class="text-xs text-slate-500 block mb-1">發病年份</label><div class="text-sm font-bold text-slate-700">${d.diabetes?.onsetYear || '-'} 年</div></div><div><label class="text-xs text-slate-500 block mb-1">治療方式</label><div class="text-sm font-bold text-slate-700">${d.diabetes?.treatment || '-'}</div></div><div><label class="text-xs text-slate-500 block mb-1">領有糖尿病護照</label><div class="text-sm font-bold text-slate-700">${d.diabetes?.hasCareCard || '-'}</div></div></div><div class="mt-auto bg-orange-50 p-4 rounded-lg border border-orange-200"><div class="flex justify-between items-center mb-2"><span class="text-sm text-orange-800 font-bold flex items-center gap-1"><i data-lucide="target" class="w-4 h-4"></i> 營養處方目標</span><span class="text-xs bg-orange-200 text-orange-800 px-2 py-1 rounded-full font-bold shadow-sm">每日建議熱量: <span class="editable-area px-1 rounded" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'nutritionData.dailySuggestedKcal', this)">${d.dailySuggestedKcal || 0}</span> kcal</span></div><div class="text-base text-orange-900 font-bold bg-white p-2 rounded border border-orange-100 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'nutritionData.goal', this)">${d.goal || '請輸入衛教目標...'}</div></div></div>
          </div>
          <div class="bg-white p-5 rounded-xl border border-orange-200 shadow-sm overflow-hidden relative"><div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4"><h3 class="text-lg font-bold text-slate-800 flex items-center gap-2"><i data-lucide="pie-chart" class="w-5 h-5 text-orange-600"></i> 食物內容設定與各餐次分配 (份)<span class="text-xs font-normal text-slate-400 ml-2">(點擊儲存格數字即可編輯，失去焦點即自動存檔重算)</span></h3><button onclick="saveNutritionPlanAsHistory()" class="text-sm bg-orange-600 text-white hover:bg-orange-700 px-4 py-2 rounded-lg flex items-center gap-2 font-bold transition-colors shadow-sm shrink-0"><i data-lucide="archive" class="w-4 h-4"></i> 將此配置存為歷史處方</button></div><div class="overflow-x-auto rounded-lg border border-slate-200"><table class="min-w-full border-collapse"><thead class="bg-slate-100"><tr><th class="px-4 py-3 text-left text-sm font-bold text-slate-700 border-r border-slate-200 border-b w-[15%]">食物分類</th>${MEAL_TIMES.map(m => `<th class="px-3 py-3 text-center text-sm font-bold text-slate-700 border-r border-slate-200 border-b w-[12%]">${m}</th>`).join('')}<th class="px-4 py-3 text-center text-sm font-bold text-orange-700 border-b border-slate-200 bg-orange-50 w-[13%]">最新總計</th></tr></thead><tbody>${tableRows}</tbody></table></div></div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div class="bg-white p-5 rounded-xl border border-orange-200 shadow-sm flex flex-col"><div class="flex justify-between items-center mb-5 border-b border-slate-100 pb-3"><h3 class="text-lg font-bold text-slate-800 flex items-center gap-2"><i data-lucide="file-text" class="w-5 h-5 text-orange-600"></i> 營養衛教與會談紀錄</h3><button onclick="addNewRecord('nutritionRecord')" class="text-sm bg-orange-50 text-orange-700 hover:bg-orange-100 px-3 py-1.5 rounded-lg flex items-center gap-1 font-medium transition-colors border border-orange-200"><i data-lucide="plus" class="w-4 h-4"></i> 新增紀錄</button></div><div class="space-y-4 flex-1">${recordsHtml.length > 0 ? recordsHtml : '<div class="text-center text-slate-400 py-8 text-sm bg-slate-50 rounded-lg border border-dashed border-slate-200">尚無會談與衛教紀錄</div>'}</div></div>
              <div class="bg-white p-5 rounded-xl border border-orange-200 shadow-sm flex flex-col bg-slate-50/50"><div class="flex justify-between items-center mb-5 border-b border-slate-200 pb-3"><h3 class="text-lg font-bold text-slate-800 flex items-center gap-2"><i data-lucide="history" class="w-5 h-5 text-orange-600"></i> 歷史處方與目標紀錄</h3></div><div class="space-y-4 flex-1 overflow-y-auto pr-2" style="max-height: 600px;">${planHistoryHtml.length > 0 ? planHistoryHtml : '<div class="text-center text-slate-400 py-8 text-sm bg-white rounded-lg border border-dashed border-slate-200 shadow-sm">尚無存檔的歷史處方</div>'}</div></div>
          </div>
          ${renderTabMeta(patient.id, 'nutritionData.meta', d.meta)}
        </div>
      `;
    }

    function renderSocialWorker(patient) {
      const d = patient.socialWorkData || {};
      const WELFARE_OPTS = ['急難救助', '社會福利身分', '社會保險', '身心障礙福利', '長照資源', '輔具租借資訊', '心理衛生資源', '法律扶助'];
      const EMOTION_OPTS = ['評估疾病認知', '促進疾病調適', '情緒支持', '引導正向思考', '加強問題解決能力'];
      const FAMILY_OPTS = ['評估家庭支持系統', '促進家庭溝通', '脆弱家庭評估或通報'];

      return `
        <div class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-xl border border-purple-200 shadow-sm"><h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="home" class="w-5 h-5 text-purple-600"></i> 家庭狀況評估</h3><div class="space-y-4"><div class="grid grid-cols-2 gap-4 border-b border-slate-100 pb-4"><div><label class="text-xs text-slate-500 block mb-1">居住情形</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-1.5 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'socialWorkData.familyStatus.living', this)">${d.familyStatus?.living || '-'}</div></div><div><label class="text-xs text-slate-500 block mb-1">家庭關係</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-1.5 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'socialWorkData.familyStatus.familyRel', this)">${d.familyStatus?.familyRel || '-'}</div></div><div class="col-span-2"><label class="text-xs text-slate-500 block mb-1">緊急聯絡人資訊</label><div class="text-sm font-medium bg-purple-50 text-purple-900 border border-purple-100 rounded p-2 flex gap-2">姓名: <span class="editable-area px-1 rounded" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'socialWorkData.emergencyContact.name', this)">${d.emergencyContact?.name || '-'}</span> / 關係: <span class="editable-area px-1 rounded" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'socialWorkData.emergencyContact.relation', this)">${d.emergencyContact?.relation || '-'}</span> / 電話: <span class="editable-area px-1 rounded" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'socialWorkData.emergencyContact.phone', this)">${d.emergencyContact?.phone || '-'}</span></div></div></div><div><label class="text-xs text-slate-500 block mb-1">家系圖與家庭狀況說明 (文字敘述)</label><div class="text-sm text-slate-700 bg-slate-50 p-3 rounded-lg border border-slate-200 editable-area min-h-[4rem]" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'socialWorkData.familyStatus.description', this)">${d.familyStatus?.description || '無紀錄'}</div></div></div></div>
            <div class="bg-white p-5 rounded-xl border border-purple-200 shadow-sm"><h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="file-check" class="w-5 h-5 text-purple-600"></i> 福利與保險身分</h3><div class="space-y-6"><div><label class="text-xs font-bold text-slate-700 block mb-2 border-b border-slate-100 pb-1">社會福利身分</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-2 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'socialWorkData.welfare.status', this)">${Array.isArray(d.welfare?.status) ? d.welfare.status.join('、') : (d.welfare?.status || '無')}</div></div><div><label class="text-xs font-bold text-slate-700 block mb-2 border-b border-slate-100 pb-1">社會保險身分</label><div class="text-sm font-medium bg-slate-50 border border-slate-200 rounded p-2 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'socialWorkData.welfare.insurance', this)">${Array.isArray(d.welfare?.insurance) ? d.welfare.insurance.join('、') : (d.welfare?.insurance || '無')}</div></div></div></div>
          </div>
          <div class="bg-white p-5 rounded-xl border border-purple-200 shadow-sm">
             <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="pen-tool" class="w-5 h-5 text-purple-600"></i> 處遇內容與說明</h3>
             <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-5"><div class="bg-white p-4 rounded-lg border border-purple-100 shadow-sm hover:border-purple-300 transition-colors"><div class="text-sm font-bold text-purple-800 flex items-center gap-1"><i data-lucide="check-square" class="w-4 h-4"></i> 福利諮詢</div>${renderCheckboxes(patient.id, WELFARE_OPTS, d.treatment?.welfareConsult, 'socialWorkData.treatment.welfareConsult', 'purple')}</div><div class="bg-white p-4 rounded-lg border border-purple-100 shadow-sm hover:border-purple-300 transition-colors"><div class="text-sm font-bold text-purple-800 flex items-center gap-1"><i data-lucide="check-square" class="w-4 h-4"></i> 情緒與疾病適應</div>${renderCheckboxes(patient.id, EMOTION_OPTS, d.treatment?.emotionAdapt, 'socialWorkData.treatment.emotionAdapt', 'purple')}</div><div class="bg-white p-4 rounded-lg border border-purple-100 shadow-sm hover:border-purple-300 transition-colors"><div class="text-sm font-bold text-purple-800 flex items-center gap-1"><i data-lucide="check-square" class="w-4 h-4"></i> 家庭問題</div>${renderCheckboxes(patient.id, FAMILY_OPTS, d.treatment?.familyProblem, 'socialWorkData.treatment.familyProblem', 'purple')}</div></div>
            <div><label class="text-xs font-bold text-slate-700 block mb-2">處遇說明 (詳細文字敘述)</label><div class="text-base text-slate-800 bg-slate-50 p-4 rounded-lg border border-slate-200 editable-area min-h-[100px] leading-relaxed" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'socialWorkData.treatment.description', this)">${d.treatment?.description || '請輸入詳細處遇說明...'}</div></div>
          </div>
          ${renderTabMeta(patient.id, 'socialWorkData.meta', d.meta)}
        </div>
      `;
    }

    function renderPsychologist(patient) {
      const d = patient.psychData || {};
      const bsrsTotal = (d.bsrs || []).slice(0, 5).reduce((a, b) => a + Number(b), 0);
      const suicideScore = Number(d.bsrs?.[5] || 0);
      const isiTotal = (d.isi || []).reduce((a, b) => a + Number(b), 0);
      
      let bsrsStatus = "身心良好"; let bsrsColor = "text-green-600 bg-green-50 border-green-200";
      if (bsrsTotal >= 15) { bsrsStatus = "重度困擾 (建議轉介)"; bsrsColor = "text-red-600 bg-red-50 border-red-200"; }
      else if (bsrsTotal >= 10) { bsrsStatus = "中度困擾 (建議諮商)"; bsrsColor = "text-orange-600 bg-orange-50 border-orange-200"; }
      else if (bsrsTotal >= 6) { bsrsStatus = "輕度困擾 (尋求支持)"; bsrsColor = "text-yellow-600 bg-yellow-50 border-yellow-200"; }
      if (suicideScore >= 2) { bsrsStatus = "需高度關懷 (有自殺意念)"; bsrsColor = "text-red-600 bg-red-50 border-red-200"; }

      let isiStatus = "無明顯失眠困擾"; let isiColor = "text-green-600 bg-green-50 border-green-200";
      if (isiTotal >= 22) { isiStatus = "有嚴重失眠困擾 (建議就診)"; isiColor = "text-red-600 bg-red-50 border-red-200"; }
      else if (isiTotal >= 15) { isiStatus = "有明顯失眠困擾 (建議就診)"; isiColor = "text-orange-600 bg-orange-50 border-orange-200"; }
      else if (isiTotal >= 8) { isiStatus = "稍有睡眠困擾 (持續追蹤)"; isiColor = "text-yellow-600 bg-yellow-50 border-yellow-200"; }

      let recordsHtml = (d.records || []).map((r, index) => `
        <div class="p-4 border border-slate-200 bg-white rounded-xl flex gap-4 shadow-sm relative group hover:border-pink-300 transition-colors">
          <button onclick="deleteRecordItem('psychData.records', ${index})" class="absolute top-2 right-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          <div class="text-center min-w-[90px] pr-4 border-r border-slate-100"><div class="text-sm font-bold text-slate-700 editable-area px-1 rounded" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'psychData.records.${index}.date', this)">${r.date}</div><div class="text-xs text-slate-500 mt-1 editable-area px-1 rounded" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'psychData.records.${index}.time', this)">${r.time}</div><div class="text-[10px] text-slate-400 mt-2"><i data-lucide="pen-tool" class="w-3 h-3 inline mr-1"></i>${r.recorder}</div></div>
          <div class="flex-1 pl-2"><span class="inline-block px-2 py-1 bg-pink-100 text-pink-800 text-xs font-bold rounded mb-2 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'psychData.records.${index}.project', this)">${r.project}</span><div class="text-sm text-slate-700 leading-relaxed editable-area p-1 min-h-[3rem] border border-transparent hover:border-slate-200 rounded" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'psychData.records.${index}.content', this)">${r.content}</div></div>
        </div>
      `).join('');

      return `
        <div class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-5 rounded-xl border border-pink-200 shadow-sm flex flex-col"><div class="flex justify-between items-start mb-4"><h3 class="text-lg font-bold text-slate-800 flex items-center gap-2"><i data-lucide="brain" class="w-5 h-5 text-pink-600"></i> BSRS-5 簡式健康量表</h3><div class="text-right"><div class="text-3xl font-black text-slate-800 leading-none">${bsrsTotal} <span class="text-sm font-normal text-slate-500">分</span></div><div class="text-xs font-bold mt-1 px-2 py-0.5 rounded border ${bsrsColor}">${bsrsStatus}</div></div></div><div class="space-y-2 mt-auto"><div class="flex justify-between text-xs text-slate-400 border-b border-slate-100 pb-1 px-1"><span>評估項目 (近一週)</span><span>分數 (0-4)</span></div>${BSRS_QUESTIONS.map((q, idx) => `<div class="flex justify-between items-center text-sm border-b border-slate-50 pb-2 pt-1 hover:bg-slate-50 px-1 rounded transition-colors"><span class="${idx===5 ? 'text-red-600 font-bold' : 'text-slate-700'}">${idx+1}. ${q}</span><div class="font-bold text-slate-800 w-8 text-center bg-slate-100 rounded border border-slate-200 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'psychData.bsrs.${idx}', this)">${d.bsrs?.[idx] || 0}</div></div>`).join('')}<div class="text-[10px] text-slate-400 mt-2 text-right">0:完全不會, 1:輕微, 2:中等, 3:嚴重, 4:非常嚴重</div></div></div>
            <div class="bg-white p-5 rounded-xl border border-pink-200 shadow-sm flex flex-col"><div class="flex justify-between items-start mb-4"><h3 class="text-lg font-bold text-slate-800 flex items-center gap-2"><i data-lucide="moon" class="w-5 h-5 text-pink-600"></i> ISI 失眠嚴重度量表</h3><div class="text-right"><div class="text-3xl font-black text-slate-800 leading-none">${isiTotal} <span class="text-sm font-normal text-slate-500">分</span></div><div class="text-xs font-bold mt-1 px-2 py-0.5 rounded border ${isiColor}">${isiStatus}</div></div></div><div class="space-y-2 mt-auto"><div class="flex justify-between text-xs text-slate-400 border-b border-slate-100 pb-1 px-1"><span>評估項目 (近兩週)</span><span>分數 (0-4)</span></div>${ISI_QUESTIONS.map((q, idx) => `<div class="flex justify-between items-center text-sm border-b border-slate-50 pb-2 pt-1 hover:bg-slate-50 px-1 rounded transition-colors"><span class="text-slate-700">${idx+1}. ${q}</span><div class="font-bold text-slate-800 w-8 text-center bg-slate-100 rounded border border-slate-200 editable-area" contenteditable="true" onblur="handleContentUpdate('${patient.id}', 'psychData.isi.${idx}', this)">${d.isi?.[idx] || 0}</div></div>`).join('')}</div></div>
          </div>
          <div class="bg-white p-5 rounded-xl border border-pink-200 shadow-sm"><div class="flex justify-between items-center mb-5"><h3 class="text-lg font-bold text-slate-800 flex items-center gap-2"><i data-lucide="file-text" class="w-5 h-5 text-pink-600"></i> 照護會談紀錄</h3><button onclick="addNewRecord('psychRecord')" class="text-sm bg-pink-50 text-pink-700 hover:bg-pink-100 px-3 py-1.5 rounded-lg flex items-center gap-1 font-medium transition-colors border border-pink-200"><i data-lucide="plus" class="w-4 h-4"></i> 新增紀錄</button></div><div class="space-y-4">${recordsHtml.length > 0 ? recordsHtml : '<div class="text-center text-slate-400 py-6 text-sm bg-slate-50 rounded-lg">尚無會談紀錄</div>'}</div></div>
          ${renderTabMeta(patient.id, 'psychData.meta', d.meta)}
        </div>
      `;
    }

    // 啟討 Firebase 與應用
    initSystem();
  </script>
</body>
</html>
